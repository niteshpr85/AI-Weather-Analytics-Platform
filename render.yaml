services:
  - type: web
    name: ai-weather-analytics-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENWEATHER_BASE_URL
        value: https://api.openweathermap.org
